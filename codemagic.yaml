# Codemagic — iOS archive needs ios/Runner/GoogleService-Info.plist on disk.
# Optional: set GOOGLE_SERVICES_INFO_PLIST_BASE64 in app env to overwrite the
# committed placeholder with your real Firebase plist before build.
workflows:
  ios-ipa:
    name: iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Firebase iOS plist (optional overwrite)
        script: |
          set -euo pipefail
          PLIST="ios/Runner/GoogleService-Info.plist"
          if [ -n "${GOOGLE_SERVICES_INFO_PLIST_BASE64:-}" ]; then
            echo "${GOOGLE_SERVICES_INFO_PLIST_BASE64}" | base64 -d > "$PLIST"
            echo "Wrote GoogleService-Info.plist from GOOGLE_SERVICES_INFO_PLIST_BASE64"
          elif [ -n "${GOOGLE_SERVICES_INFO_PLIST:-}" ]; then
            printf '%s' "${GOOGLE_SERVICES_INFO_PLIST}" > "$PLIST"
            echo "Wrote GoogleService-Info.plist from GOOGLE_SERVICES_INFO_PLIST"
          else
            echo "Using committed placeholder GoogleService-Info.plist (set BASE64 var for production FCM)"
          fi

          # Validate plist exists and looks like a real Firebase config.
          if [ ! -f "$PLIST" ]; then
            echo "ERROR: Missing $PLIST"
            exit 1
          fi
          # Read safe fields (do not print API_KEY).
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :BUNDLE_ID" "$PLIST" 2>/dev/null || true)
          PROJECT_ID=$(/usr/libexec/PlistBuddy -c "Print :PROJECT_ID" "$PLIST" 2>/dev/null || true)
          GOOGLE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :GOOGLE_APP_ID" "$PLIST" 2>/dev/null || true)
          echo "Firebase plist BUNDLE_ID=${BUNDLE_ID:-<missing>}"
          echo "Firebase plist PROJECT_ID=${PROJECT_ID:-<missing>}"
          echo "Firebase plist GOOGLE_APP_ID=${GOOGLE_APP_ID:-<missing>}"
          if [ -z "${BUNDLE_ID:-}" ] || [ -z "${GOOGLE_APP_ID:-}" ]; then
            echo "ERROR: GoogleService-Info.plist is invalid (missing required keys)."
            exit 1
          fi
          if [ "${PROJECT_ID:-}" = "somon-ci-placeholder" ]; then
            echo "ERROR: Placeholder GoogleService-Info.plist detected. Set GOOGLE_SERVICES_INFO_PLIST_BASE64 in Codemagic."
            exit 1
          fi
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          # App Store Connect requires CFBundleVersion to be strictly increasing.
          # Use Codemagic numeric build counters (CM_BUILD_NUMBER / BUILD_NUMBER) and
          # apply a large offset to avoid duplicates even if counters reset per-workflow.
          RAW_BUILD_NO="${CM_BUILD_NUMBER:-${BUILD_NUMBER:-1}}"
          BUILD_NO="$(( RAW_BUILD_NO + 10000 ))"
          echo "Using iOS build number: ${BUILD_NO} (raw=${RAW_BUILD_NO})"
          flutter build ipa --release --build-number="${BUILD_NO}"


